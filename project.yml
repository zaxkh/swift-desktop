name: Mattermost
options:
  bundleIdPrefix: com.mattermost
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Mattermost:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
      - path: Models
      - path: Stores
      - path: Services
      - path: Views
    dependencies:
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_NAME: Mattermost
        PRODUCT_BUNDLE_IDENTIFIER: com.mattermost.native-desktop
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Mattermost.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
