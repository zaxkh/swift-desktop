name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build
        run: xcodebuild -project Mattermost.xcodeproj -scheme Mattermost -configuration Debug -derivedDataPath /tmp/MattermostDerivedData build
